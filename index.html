<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4주 다이어트 운동&식단 가이드</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="app-container">

  <header class="header">
    <div class="header-content">
      <h1><i class="fas fa-fire"></i> 4주 다이어트 운동&식단 가이드</h1>
      <p class="header-sub" id="header-countdown">목표를 설정하고 변화를 시작하세요</p>
    </div>
  </header>

  <nav class="nav-tabs">
    <button class="tab-btn active" data-tab="goal">
      <i class="fas fa-bullseye"></i><span>목표설정</span>
    </button>
    <button class="tab-btn" data-tab="plan">
      <i class="fas fa-dumbbell"></i><span>운동플랜</span>
    </button>
  </nav>

  <!-- ===== TAB 1: 목표설정 ===== -->
  <section id="goal" class="tab-content active">
    <div class="section-title"><i class="fas fa-bullseye"></i> 프로필 & 목표 설정</div>

    <div class="card">
      <h3 class="card-title"><i class="fas fa-venus-mars"></i> 성별</h3>
      <div class="choice-grid cols-2">
        <div class="choice-card" data-group="gender" data-value="female">
          <i class="fas fa-venus"></i><span>여성</span>
        </div>
        <div class="choice-card" data-group="gender" data-value="male">
          <i class="fas fa-mars"></i><span>남성</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title"><i class="fas fa-user"></i> 기본 정보</h3>
      <div class="input-row">
        <div class="input-group">
          <label>나이</label>
          <input type="number" id="inp-age" placeholder="28" min="15" max="80">
          <span class="input-unit">세</span>
        </div>
        <div class="input-group">
          <label>키</label>
          <input type="number" id="inp-height" placeholder="165" min="140" max="210">
          <span class="input-unit">cm</span>
        </div>
        <div class="input-group">
          <label>현재 체중</label>
          <input type="number" id="inp-weight" placeholder="58.5" step="0.1" min="30" max="200">
          <span class="input-unit">kg</span>
        </div>
        <div class="input-group">
          <label>현재 체지방률</label>
          <input type="number" id="inp-bodyfat" placeholder="25" min="5" max="60">
          <span class="input-unit">%</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title"><i class="fas fa-leaf"></i> 체질 / 신체 유형</h3>
      <div class="choice-grid cols-2">
        <div class="choice-card" data-group="bodyType" data-value="ecto">
          <i class="fas fa-feather"></i><span>마른 체형</span><small>살이 잘 안 찌는 편</small>
        </div>
        <div class="choice-card" data-group="bodyType" data-value="meso">
          <i class="fas fa-person"></i><span>보통 체형</span><small>평균적인 체형</small>
        </div>
        <div class="choice-card" data-group="bodyType" data-value="endo">
          <i class="fas fa-circle"></i><span>비만 체형</span><small>살이 잘 찌는 편</small>
        </div>
        <div class="choice-card" data-group="bodyType" data-value="athlete">
          <i class="fas fa-trophy"></i><span>운동 경험자</span><small>꾸준히 운동해온 편</small>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title"><i class="fas fa-flag-checkered"></i> 4주 목표</h3>
      <div class="input-row">
        <div class="input-group">
          <label>목표 체중</label>
          <input type="number" id="inp-target-weight" placeholder="55.0" step="0.1">
          <span class="input-unit">kg</span>
        </div>
        <div class="input-group">
          <label>목표 체지방률</label>
          <input type="number" id="inp-target-bodyfat" placeholder="22">
          <span class="input-unit">%</span>
        </div>
        <div class="input-group">
          <label>시작일</label>
          <input type="date" id="inp-start-date">
        </div>
      </div>
      <div id="goal-preview" class="goal-preview" style="display:none;"></div>
    </div>

    <div class="card">
      <h3 class="card-title"><i class="fas fa-dumbbell"></i> 주간 근력 운동</h3>
      <div class="plan-row">
        <label>주 몇 회?</label>
        <div class="day-picker" id="strength-days">
          <button class="day-btn" data-val="1">1회</button>
          <button class="day-btn" data-val="2">2회</button>
          <button class="day-btn" data-val="3">3회</button>
          <button class="day-btn" data-val="4">4회</button>
          <button class="day-btn" data-val="5">5회</button>
          <button class="day-btn" data-val="6">6회</button>
          <button class="day-btn" data-val="7">7회</button>
        </div>
      </div>
      <div class="plan-row">
        <label>회당 시간?</label>
        <div class="time-picker" id="strength-min">
          <button class="time-btn" data-val="30">30분</button>
          <button class="time-btn" data-val="45">45분</button>
          <button class="time-btn" data-val="60">60분</button>
          <button class="time-btn" data-val="90">90분</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title"><i class="fas fa-person-running"></i> 주간 유산소 운동</h3>
      <div class="plan-row">
        <label>주 몇 회?</label>
        <div class="day-picker" id="cardio-days">
          <button class="day-btn" data-val="1">1회</button>
          <button class="day-btn" data-val="2">2회</button>
          <button class="day-btn" data-val="3">3회</button>
          <button class="day-btn" data-val="4">4회</button>
          <button class="day-btn" data-val="5">5회</button>
          <button class="day-btn" data-val="6">6회</button>
          <button class="day-btn" data-val="7">7회</button>
        </div>
      </div>
      <div class="plan-row">
        <label>회당 시간?</label>
        <div class="time-picker" id="cardio-min">
          <button class="time-btn" data-val="20">20분</button>
          <button class="time-btn" data-val="30">30분</button>
          <button class="time-btn" data-val="45">45분</button>
          <button class="time-btn" data-val="60">60분</button>
        </div>
      </div>
    </div>

    <button class="btn-generate" id="btn-save-goal">
      <i class="fas fa-wand-magic-sparkles"></i> 맞춤 운동+식단 플랜 생성하기
    </button>
  </section>

  <!-- ===== TAB 2: 운동플랜 ===== -->
  <section id="plan" class="tab-content">
    <div class="section-title"><i class="fas fa-dumbbell"></i> 운동 플랜</div>

    <div id="plan-empty" class="empty-state">
      <i class="fas fa-wand-magic-sparkles"></i>
      <p>먼저 <strong>목표설정</strong> 탭에서<br>프로필과 목표를 저장하세요!</p>
    </div>

    <div id="plan-content" style="display:none;">
      <!-- 칼로리 카드 -->
      <div class="card calorie-summary-card">
        <h3 class="card-title"><i class="fas fa-fire-flame-curved"></i> 일일 칼로리 목표</h3>
        <div class="calorie-boxes">
          <div class="cal-box">
            <div class="cal-number" id="plan-bmr">-</div>
            <div class="cal-label">기초대사량</div>
          </div>
          <div class="cal-box accent">
            <div class="cal-number" id="plan-target-cal">-</div>
            <div class="cal-label">목표 섭취량</div>
          </div>
          <div class="cal-box">
            <div class="cal-number" id="plan-protein">-</div>
            <div class="cal-label">단백질 목표 g</div>
          </div>
        </div>
      </div>

      <!-- 요일 선택 -->
      <div class="week-day-grid" id="week-day-grid"></div>

      <!-- 오늘 운동 상세 -->
      <div id="day-workout-view"></div>

      <!-- 식단 플랜 -->
      <div class="card" style="margin-top:16px;">
        <h3 class="card-title"><i class="fas fa-utensils"></i> 추천 식단 플랜</h3>
        <div id="diet-plan"></div>
      </div>
    </div>
  </section>


</div>
<div id="toast" class="toast"></div>
<script src="script.js"></script>
</body>
</html>
